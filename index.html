<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Glow Clinic — AI Agent Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 8px 32px}

.top-banner{width:100%;max-width:400px;background:#BE185D;color:white;text-align:center;padding:10px 16px;border-radius:12px 12px 0 0;font-family:'Kanit',sans-serif;font-size:14px}
.top-banner span{font-size:12px;opacity:0.85;font-family:'Sarabun',sans-serif;display:block;margin-top:2px}

.scenario-bar{width:100%;max-width:400px;background:#fff;padding:10px 12px 8px;border-left:0.5px solid #ddd;border-right:0.5px solid #ddd}
.scenario-label{font-size:11px;color:#888;margin-bottom:6px;text-align:center}
.scenario-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.sc-btn{background:#f5f5f5;border:0.5px solid #ddd;border-radius:999px;padding:6px 13px;font-size:12px;font-family:'Sarabun',sans-serif;color:#333;cursor:pointer}
.sc-btn.active{background:#BE185D;border-color:#BE185D;color:white}

.phone-frame{width:100%;max-width:400px;background:white;border:0.5px solid #ddd;border-radius:0 0 20px 20px;overflow:hidden;display:flex;flex-direction:column}

.status-bar{background:#1a1a1a;padding:10px 16px 6px;display:flex;justify-content:space-between;align-items:center}
.status-time{color:white;font-size:13px;font-weight:500}
.status-icons{color:white;font-size:11px}

.line-header{background:#1a1a1a;padding:10px 14px;display:flex;align-items:center;gap:10px}
.line-avatar{width:36px;height:36px;border-radius:50%;background:#BE185D;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.line-name{color:white;font-size:14px;font-weight:500;font-family:'Kanit',sans-serif}
.line-status{color:#aaa;font-size:11px}
.line-icons{margin-left:auto;display:flex;gap:14px}
.hdr-icon{color:white;font-size:20px;cursor:pointer}

.chat-area{background:#87CEAC;padding:12px 10px;display:flex;flex-direction:column;gap:10px;min-height:360px}

.msg-row{display:flex;align-items:flex-end;gap:7px}
.msg-row.user{flex-direction:row-reverse}
.avatar-sm{width:30px;height:30px;border-radius:50%;background:#BE185D;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:white}
.avatar-user{width:30px;height:30px;border-radius:50%;background:#888;flex-shrink:0}

.bubble{max-width:72%;padding:9px 12px;font-size:14px;line-height:1.55;font-family:'Sarabun',sans-serif}
.bubble.ai{background:white;border-radius:2px 14px 14px 14px;color:#222}
.bubble.user{background:#06C755;border-radius:14px 2px 14px 14px;color:white}
.bubble .btime{font-size:10px;color:#999;margin-top:4px;text-align:right}
.bubble.user .btime{color:rgba(255,255,255,0.7)}

.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:#87CEAC;min-height:44px}
.qr-btn{background:white;border:0.5px solid #ccc;border-radius:999px;padding:7px 14px;font-size:13px;font-family:'Sarabun',sans-serif;color:#333;cursor:pointer}
.qr-btn:active{background:#f0f0f0}
.qr-btn.disabled{opacity:0.4;pointer-events:none}

.typing-row{display:flex;align-items:flex-end;gap:7px}
.typing-bubble{background:white;border-radius:2px 14px 14px 14px;padding:10px 14px;display:flex;gap:4px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:#bbb;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.input-bar{background:white;border-top:0.5px solid #ddd;padding:8px 10px;display:flex;align-items:center;gap:8px}
.input-bar input{flex:1;border:0.5px solid #ddd;border-radius:999px;padding:8px 14px;font-size:13px;font-family:'Sarabun',sans-serif;color:#333;outline:none}
.send-btn{width:36px;height:36px;border-radius:50%;background:#06C755;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:18px;color:white}

.footer-note{width:100%;max-width:400px;text-align:center;padding:12px 8px 0;font-size:12px;color:#999;font-family:'Sarabun',sans-serif;line-height:1.6}
.cta-link{display:inline-block;margin-top:10px;background:#BE185D;color:white;padding:10px 24px;border-radius:999px;font-size:14px;font-family:'Kanit',sans-serif;text-decoration:none}
</style>
</head>
<body>

<div class="top-banner">
  ✨ ClinicAI — ทดลองใช้ระบบจริง
  <span>กดที่ปุ่มด้านล่างเพื่อเริ่มสนทนา</span>
</div>

<div class="scenario-bar">
  <div class="scenario-label">เลือกสถานการณ์ที่อยากดู</div>
  <div class="scenario-btns">
    <button class="sc-btn active" onclick="loadScenario(0)">นัดหมาย</button>
    <button class="sc-btn" onclick="loadScenario(1)">ครบนัด Botox</button>
    <button class="sc-btn" onclick="loadScenario(2)">ถามราคา</button>
    <button class="sc-btn" onclick="loadScenario(3)">No-show</button>
  </div>
</div>

<div class="phone-frame">
  <div class="status-bar">
    <span class="status-time" id="clockDisplay">9:41</span>
    <span class="status-icons">●●● WiFi 100%</span>
  </div>
  <div class="line-header">
    <div class="line-avatar">✨</div>
    <div>
      <div class="line-name">Glow Clinic</div>
      <div class="line-status">AI พร้อมให้บริการ</div>
    </div>
    <div class="line-icons">
      <span class="hdr-icon">📞</span>
      <span class="hdr-icon">⋯</span>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>
  <div class="quick-replies" id="quickReplies"></div>

  <div class="input-bar">
    <input type="text" id="userInput" placeholder="พิมพ์ข้อความ..." onkeydown="if(event.key==='Enter')sendUserMsg()">
    <button class="send-btn" onclick="sendUserMsg()">➤</button>
  </div>
</div>

<div class="footer-note">
  นี่คือตัวอย่างการทำงานของระบบ AI Agent<br>สำหรับคลินิกความงาม ผ่าน LINE OA จริง
  <br><br>
  <a class="cta-link" href="#">ปรึกษาฟรี — ติดต่อเราเลย</a>
</div>

<script>
const now = new Date();
document.getElementById('clockDisplay').textContent =
  now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

const scenarios = [
  {
    messages:[{from:"ai",text:"สวัสดีค่ะ ยินดีต้อนรับสู่ Glow Clinic 🌸\nอยากให้ช่วยเรื่องอะไรคะ?",time:"9:41"}],
    replies:["นัด Botox","นัด Filler","นัด Laser หน้า","ดู treatment ทั้งหมด"],
    flows:{
      "นัด Botox":[
        {from:"user",text:"นัด Botox ค่ะ",time:"9:41"},
        {from:"typing"},
        {from:"ai",text:"ได้เลยค่ะ 😊\nขอถามข้อมูลนิดหน่อยนะคะ\n\nเคยทำ Botox กับทางคลินิกมาก่อนไหมคะ?",time:"9:41"}
      ],
      "replies_2":["เคยค่ะ","ครั้งแรกเลยค่ะ"],
      "เคยค่ะ":[
        {from:"user",text:"เคยค่ะ",time:"9:42"},
        {from:"typing"},
        {from:"ai",text:"ยอดเยี่ยมเลยค่ะ 🌟\nวันที่ว่างใกล้ๆ นี้\n\n📅 พุธที่ 28 พ.ค. — 10:00 / 14:00 / 16:00 น.\n📅 พฤหัสที่ 29 พ.ค. — 11:00 / 15:00 น.\n📅 เสาร์ที่ 31 พ.ค. — 10:00 / 13:00 น.",time:"9:42"}
      ],
      "replies_3":["พุธ 10:00","เสาร์ 10:00","เสาร์ 13:00"],
      "เสาร์ 10:00":[
        {from:"user",text:"เสาร์ 10 โมงค่ะ",time:"9:43"},
        {from:"typing"},
        {from:"ai",text:"✅ ยืนยันนัดแล้วค่ะ!\n\n📅 วันเสาร์ที่ 31 พ.ค. เวลา 10:00 น.\n💉 Botox\n📍 Glow Clinic สาขาสุขุมวิท\n\nจะส่ง reminder ให้ก่อน 1 วันนะคะ ✨",time:"9:43"}
      ],
      "พุธ 10:00":[
        {from:"user",text:"พุธ 10 โมงค่ะ",time:"9:43"},
        {from:"typing"},
        {from:"ai",text:"✅ ยืนยันนัดแล้วค่ะ!\n\n📅 วันพุธที่ 28 พ.ค. เวลา 10:00 น.\n💉 Botox\n📍 Glow Clinic สาขาสุขุมวิท\n\nจะส่ง reminder ให้ก่อน 1 วันนะคะ ✨",time:"9:43"}
      ]
    }
  },
  {
    messages:[{from:"ai",text:"สวัสดีค่ะ คุณปรียา 💕\n\nแจ้งเตือนว่าครบ 3 เดือนแล้วนะคะ\nถึงเวลา Botox รอบใหม่แล้วค่ะ ✨\n\nอยากนัดไหมคะ?",time:"14:22"}],
    replies:["นัดเลยค่ะ","ขอดูวันว่างก่อน","เดือนหน้าค่อยนัด"],
    flows:{
      "นัดเลยค่ะ":[
        {from:"user",text:"นัดเลยค่ะ",time:"14:22"},
        {from:"typing"},
        {from:"ai",text:"ดีใจที่ได้ต้อนรับกลับมาค่ะ 🥰\n\n📅 พฤหัสที่ 29 พ.ค. — 15:00 น.\n📅 เสาร์ที่ 31 พ.ค. — 10:00 / 13:00 น.\n\nสะดวกวันไหนคะ?",time:"14:23"}
      ],
      "replies_2":["พฤหัส 15:00","เสาร์ 10:00"],
      "พฤหัส 15:00":[
        {from:"user",text:"พฤหัส 15:00 ค่ะ",time:"14:23"},
        {from:"typing"},
        {from:"ai",text:"✅ ยืนยันแล้วค่ะ!\n\n📅 พฤหัสที่ 29 พ.ค. เวลา 15:00 น.\n💉 Botox (ลูกค้าประจำ)\n\nเนื่องจากคุณปรียาเป็นลูกค้าประจำ\nรับส่วนลด 5% รอบนี้ด้วยนะคะ 🎁",time:"14:23"}
      ]
    }
  },
  {
    messages:[{from:"ai",text:"สวัสดีค่ะ ยินดีต้อนรับสู่ Glow Clinic 🌸\nมีอะไรให้ช่วยไหมคะ?",time:"11:05"}],
    replies:["ราคา Botox","ราคา Filler","ราคา Laser หน้า","ทำ Botox เจ็บไหม"],
    flows:{
      "ราคา Botox":[
        {from:"user",text:"ราคา Botox เท่าไหร่คะ",time:"11:05"},
        {from:"typing"},
        {from:"ai",text:"Botox ที่ Glow Clinic ราคาเริ่มต้น\n\n💉 หน้าผาก — 2,500 บาท\n💉 ระหว่างคิ้ว — 2,000 บาท\n💉 หางตา — 2,000 บาท\n💉 Package ครบหน้า — 5,500 บาท\n\nอยากนัดปรึกษาฟรีก่อนไหมคะ? 😊",time:"11:05"}
      ],
      "replies_2":["นัดปรึกษาฟรี","ทำเจ็บไหม","ขอบคุณค่ะ"],
      "ทำเจ็บไหม":[
        {from:"user",text:"ทำเจ็บไหมคะ",time:"11:06"},
        {from:"typing"},
        {from:"ai",text:"เจ็บน้อยมากค่ะ 🩷\n\nใช้เข็มขนาดเล็กมาก รู้สึกเหมือน\nถูกยุงกัดเท่านั้นเองค่ะ\n\nไม่ต้องพักฟื้น กลับไปทำงานได้ทันที ✨\n\nอยากนัดปรึกษาฟรีก่อนไหมคะ?",time:"11:06"}
      ],
      "นัดปรึกษาฟรี":[
        {from:"user",text:"นัดปรึกษาฟรีค่ะ",time:"11:06"},
        {from:"typing"},
        {from:"ai",text:"ดีใจมากเลยค่ะ! 🌟\n\nปรึกษาฟรี 15 นาทีกับแพทย์\nไม่มีข้อผูกมัดใดๆ นะคะ\n\nสะดวกช่วงไหนบ้างคะ?",time:"11:06"}
      ]
    }
  },
  {
    messages:[{from:"ai",text:"สวัสดีค่ะ คุณนภา 🌸\n\nวันนี้คุณนภามีนัด Filler เวลา 14:00 น.\nแต่ยังไม่ได้รับการยืนยันนะคะ\n\nยังมาตามนัดอยู่ไหมคะ?",time:"13:30"}],
    replies:["มาแน่นอนค่ะ","ขอเลื่อนนัดได้ไหม","ไม่สะดวกมาแล้วค่ะ"],
    flows:{
      "ขอเลื่อนนัดได้ไหม":[
        {from:"user",text:"ขอเลื่อนนัดได้ไหมคะ",time:"13:31"},
        {from:"typing"},
        {from:"ai",text:"ได้เลยค่ะ ไม่มีปัญหาเลย 😊\n\n📅 พรุ่งนี้ พุธที่ 28 — 11:00 / 15:00 น.\n📅 เสาร์ที่ 31 — 10:00 / 14:00 น.\n\nสะดวกวันไหนคะ?",time:"13:31"}
      ],
      "replies_2":["พรุ่งนี้ 11:00","เสาร์ 14:00"],
      "พรุ่งนี้ 11:00":[
        {from:"user",text:"พรุ่งนี้ 11 โมงค่ะ",time:"13:31"},
        {from:"typing"},
        {from:"ai",text:"✅ เลื่อนนัดให้แล้วค่ะ!\n\n📅 พุธที่ 28 พ.ค. เวลา 11:00 น.\n💉 Filler\n\nจะส่ง reminder ให้เช้าวันพรุ่งนี้นะคะ 🌸",time:"13:31"}
      ],
      "ไม่สะดวกมาแล้วค่ะ":[
        {from:"user",text:"ไม่สะดวกมาแล้วค่ะ",time:"13:31"},
        {from:"typing"},
        {from:"ai",text:"ไม่เป็นไรเลยค่ะ 😊\n\nยกเลิกนัดให้แล้วนะคะ\nเมื่อไหร่สะดวกก็ทักมาได้เลยค่ะ\n\nGlow Clinic ยินดีต้อนรับเสมอนะคะ 🌸",time:"13:31"}
      ],
      "มาแน่นอนค่ะ":[
        {from:"user",text:"มาแน่นอนค่ะ",time:"13:30"},
        {from:"typing"},
        {from:"ai",text:"ขอบคุณมากเลยค่ะ 🙏\n\nรอต้อนรับนะคะ!\nถ้ามีอะไรสงสัยก่อนมา\nทักได้เลยนะคะ ✨",time:"13:30"}
      ]
    }
  }
];

function getChat(){return document.getElementById('chatArea')}
function getQR(){return document.getElementById('quickReplies')}

function addMsg(msg,delay){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const ca=getChat();
      if(msg.from==='typing'){
        const row=document.createElement('div');
        row.className='typing-row';
        row.id='typing-ind';
        row.innerHTML='<div class="avatar-sm">✨</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        ca.appendChild(row);
        ca.scrollTop=ca.scrollHeight;
        resolve();return;
      }
      const t=document.getElementById('typing-ind');
      if(t)t.remove();
      const row=document.createElement('div');
      row.className='msg-row '+msg.from;
      if(msg.from==='ai'){
        row.innerHTML='<div class="avatar-sm">✨</div><div class="bubble ai">'+msg.text.replace(/\n/g,'<br>')+'<div class="btime">'+msg.time+'</div></div>';
      } else {
        row.innerHTML='<div class="bubble user">'+msg.text.replace(/\n/g,'<br>')+'<div class="btime">'+msg.time+'</div></div><div class="avatar-user"></div>';
      }
      ca.appendChild(row);
      ca.scrollTop=ca.scrollHeight;
      resolve();
    },delay||0);
  });
}

function showReplies(replies,cb){
  const qr=getQR();qr.innerHTML='';
  replies.forEach(r=>{
    const btn=document.createElement('button');
    btn.className='qr-btn';btn.textContent=r;
    btn.onclick=()=>{qr.querySelectorAll('.qr-btn').forEach(b=>b.classList.add('disabled'));cb(r);};
    qr.appendChild(btn);
  });
}

async function loadScenario(idx){
  document.querySelectorAll('.sc-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const ca=getChat();ca.innerHTML='';getQR().innerHTML='';
  const sc=scenarios[idx];
  for(let i=0;i<sc.messages.length;i++) await addMsg(sc.messages[i],i===0?300:600);
  setTimeout(()=>showReplies(sc.replies,r=>handleFlow(r,sc,'replies_2',handleFlow2)),400);
}

async function handleFlow(reply,sc,nextKey,nextFn){
  const flow=sc.flows[reply];if(!flow)return;
  for(let i=0;i<flow.length;i++){
    const m=flow[i];
    if(m.from==='typing'){await addMsg(m,200);await new Promise(r=>setTimeout(r,1000));}
    else await addMsg(m,m.from==='user'?100:200);
  }
  if(sc.flows[nextKey]) setTimeout(()=>showReplies(sc.flows[nextKey],r=>nextFn(r,sc)),400);
  else getQR().innerHTML='';
}

async function handleFlow2(reply,sc){
  await handleFlow(reply,sc,'replies_3',handleFlow3);
}
async function handleFlow3(reply,sc){
  await handleFlow(reply,sc,null,()=>{});
}

async function sendUserMsg(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();if(!text)return;
  input.value='';getQR().innerHTML='';
  const t=new Date();
  const tstr=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  await addMsg({from:'user',text,time:tstr},0);
  await addMsg({from:'typing'},300);
  await new Promise(r=>setTimeout(r,1200));
  const ti=document.getElementById('typing-ind');if(ti)ti.remove();
  await addMsg({from:'ai',text:'ขอบคุณที่ติดต่อมานะคะ 🌸\n\nสำหรับข้อความนี้ทีมงานจะรีบตอบกลับค่ะ\nหรือถ้าต้องการนัดหมายกด "นัดหมาย" ได้เลยนะคะ',time:tstr},200);
  setTimeout(()=>showReplies(['นัดหมาย','ถามราคา','ติดต่อเจ้าหน้าที่'],r=>{
    document.getElementById('userInput').value=r;sendUserMsg();
  }),400);
}

loadScenario(0);
</script>
</body>
</html>
